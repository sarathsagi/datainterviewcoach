<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="rgba(165,180,252,0.15)" stroke-width="1"/>

  <!-- Graph edges (connections between nodes) -->
  <!-- Central hub to top-left -->
  <line x1="32" y1="32" x2="18" y2="20" stroke="rgba(255,255,255,0.25)" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Central hub to top-right -->
  <line x1="32" y1="32" x2="46" y2="20" stroke="rgba(255,255,255,0.25)" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Central hub to left -->
  <line x1="32" y1="32" x2="15" y2="34" stroke="rgba(255,255,255,0.25)" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Central hub to right -->
  <line x1="32" y1="32" x2="49" y2="34" stroke="rgba(255,255,255,0.25)" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Central hub to bottom-left -->
  <line x1="32" y1="32" x2="20" y2="46" stroke="rgba(255,255,255,0.25)" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Central hub to bottom-right -->
  <line x1="32" y1="32" x2="44" y2="46" stroke="rgba(255,255,255,0.25)" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Peripheral connections -->
  <line x1="18" y1="20" x2="46" y2="20" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  <line x1="15" y1="34" x2="20" y2="46" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  <line x1="49" y1="34" x2="44" y2="46" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="20" x2="15" y2="34" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  <line x1="46" y1="20" x2="49" y2="34" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>

  <!-- Brain silhouette formed by the node layout — subtle curved path suggesting left/right lobes -->
  <path d="M22 26 C18 22 14 24 14 29 C14 33 17 35 20 35 C18 39 20 44 24 44 C26 44 28 42 28 40 L36 40 C36 42 38 44 40 44 C44 44 46 39 44 35 C47 35 50 33 50 29 C50 24 46 22 42 26 C40 21 36 18 32 18 C28 18 24 21 22 26 Z" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-linejoin="round"/>
  <!-- Brain center divider -->
  <path d="M32 19 C32 22 31 26 32 32 C33 38 32 41 32 44" stroke="rgba(255,255,255,0.12)" stroke-width="0.75" stroke-linecap="round"/>

  <!-- Peripheral nodes (outer ring) -->
  <circle cx="18" cy="20" r="3" fill="white" opacity="0.9"/>
  <circle cx="46" cy="20" r="3" fill="white" opacity="0.9"/>
  <circle cx="15" cy="34" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="49" cy="34" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="20" cy="46" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="44" cy="46" r="2.5" fill="white" opacity="0.85"/>

  <!-- Central hub node — brightest -->
  <circle cx="32" cy="32" r="5" fill="white" opacity="0.15"/>
  <circle cx="32" cy="32" r="3.5" fill="url(#accent)"/>
  <circle cx="32" cy="32" r="2" fill="white"/>
</svg>
